events {
    worker_connections 1024;
}

http {

    # Logging format
    log_format gateway_log
    '$time_iso8601 | $request_method $request_uri | '
    'Status: $status | Upstream: $upstream_addr | '
    'Duration: ${request_time}s | Client: $remote_addr';

    access_log /dev/stdout gateway_log;
    error_log /dev/stderr warn;

    # Upstream services (Docker DNS)
    upstream car_upstream {
        server car-service:3001;
    }

    upstream customer_upstream {
        server customer-service:3002;
    }

    upstream rental_upstream {
        server rental-service:3003;
    }

    server {
        listen 8080;
        server_name api-gateway;

        # CORS
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization';

        add_header 'X-Gateway' 'nginx-api-gateway';

        # Car routes
        location /cars {
            proxy_pass http://car_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Correlation-ID $request_id;
        }

        # Customer routes
        location /customers {
            proxy_pass http://customer_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Correlation-ID $request_id;
        }

        # Rental routes
        location /rentals {
            proxy_pass http://rental_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Correlation-ID $request_id;
        }

        # Gateway health
        location /gateway/health {
            return 200 '{"status":"UP","gateway":"nginx"}';
            add_header Content-Type application/json;
            
        }

        # Block internal
        location /internal {
            return 403 '{"error":"Forbidden — internal route"}';
            add_header Content-Type application/json;
        }
    }
}